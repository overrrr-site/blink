<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- 必要なウェイトのみ読み込み: 400(normal), 500(medium), 600(semibold), 700(bold) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- アイコンはバンドルに埋め込み済み（API呼び出し不要） -->
    <title>Blink - 顧客管理システム</title>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#FAFAF9;gap:12px">
        <img src="/images/dog-running.webp" alt="" width="160" style="animation:splash-bounce-x 1.2s ease-in-out infinite" />
        <p style="font-size:14px;color:#57534E;font-family:'Nunito Sans',sans-serif">読み込み中...</p>
      </div>
      <style>@keyframes splash-bounce-x{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
